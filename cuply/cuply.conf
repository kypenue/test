server {
	server_name cuply.pro;
# 	root /opt/cuply/www;

#	index index.html index.htm;


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cuply.pro/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cuply.pro/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
	add_header Access-Control-Allow-Headers "*" always;
	add_header Access-Control-Allow-Methods "*" always;

	location ~ ^/api/v1/teams/tournaments/([0-9]+)/ws$ {
                proxy_pass http://127.0.0.1:8000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_read_timeout 7200s;
        }

    	location /api {
                proxy_pass http://127.0.0.1:8000;
                proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Access-Control-Allow-Origin *;
		proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Real-IP $remote_addr;
        }


    	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Access-Control-Allow-Origin *;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Real-IP $remote_addr;
	}

}

server {
    if ($host = cuply.pro) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


	listen 80;
	server_name cuply.pro;
    return 404; # managed by Certbot


}
